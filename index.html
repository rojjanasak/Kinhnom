<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KinNom Bakery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f6efe6;
    font-family: 'Segoe UI', sans-serif;
}
.navbar{
    background:#8b5e3c;
}
.navbar-brand{
    color:#fff;
    font-weight:bold;
}
.card{
    border:none;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}
.btn-main{
    background:#a67c52;
    color:#fff;
    border-radius:30px;
}
.btn-main:hover{
    background:#8b5e3c;
}
.price{
    color:#8b5e3c;
    font-weight:bold;
}
</style>
</head>

<body>

<nav class="navbar p-3">
  <div class="container">
    <span class="navbar-brand">🍰 KinNom Bakery</span>
  </div>
</nav>

<div class="container mt-4">

  <div class="row g-3">

    <!-- Banana Muffin -->
    <div class="col-12">
      <div class="card p-3">
        <h5>Banana Muffin (4 ชิ้น)</h5>
        <div class="price">฿110</div>
        <button class="btn btn-main mt-2" onclick="selectProduct('Banana Muffin (4 pcs)',110)">
          เลือก
        </button>
      </div>
    </div>

    <!-- Chiffon Cake -->
    <div class="col-12">
      <div class="card p-3">
        <h5>ชิฟฟ่อนเค้ก มะพร้าวอ่อนลาวา</h5>
        <div class="price">฿30 / ชิ้น</div>
        <button class="btn btn-main mt-2" onclick="selectProduct('ชิฟฟ่อนเค้ก',30)">
          เลือก
        </button>
      </div>
    </div>

  </div>

  <!-- Cart -->
  <div class="card p-3 mt-4" id="orderBox" style="display:none;">
    <h5>🧺 ตะกร้าของฉัน</h5>

    <div id="selectedProduct"></div>
    <div class="price" id="totalPrice"></div>

    <input type="text" id="name" class="form-control mt-2" placeholder="ชื่อ">
    <input type="text" id="phone" class="form-control mt-2" placeholder="เบอร์โทร">
    <input type="number" id="qty" class="form-control mt-2" placeholder="จำนวน" value="1" min="1">
    <textarea id="note" class="form-control mt-2" placeholder="หมายเหตุ"></textarea>

    <button class="btn btn-main w-100 mt-3" onclick="submitOrder()">
      สั่งสินค้า
    </button>
  </div>

</div>

<script>

let currentProduct = "";
let currentPrice = 0;

function selectProduct(name, price){
    currentProduct = name;
    currentPrice = price;

    document.getElementById("orderBox").style.display = "block";
    document.getElementById("selectedProduct").innerText = name;
    updateTotal();
}

document.getElementById("qty")?.addEventListener("input", updateTotal);

function updateTotal(){
    let qty = document.getElementById("qty").value || 1;
    let total = qty * currentPrice;
    document.getElementById("totalPrice").innerText = "รวม ฿" + total;
}

function submitOrder(){

    let data = {
        customer_name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        product: currentProduct,
        qty: document.getElementById("qty").value,
        note: document.getElementById("note").value
    };

    if(!data.customer_name || !data.phone){
        alert("กรุณากรอกชื่อและเบอร์โทร");
        return;
    }

    fetch("https://script.google.com/macros/s/AKfycbzIIevCl5ZptIfbjhBzfs6JIyMiWk-z60TDD8q3wS4N3gcCNvOp8OiL2eNFFVbDa78U/exec", {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
        alert("สั่งซื้อสำเร็จ 🎉");
        location.reload();
    })
    .catch(err => {
        alert("เกิดข้อผิดพลาด กรุณาลองใหม่");
    });
}

</script>

</body>
</html>
